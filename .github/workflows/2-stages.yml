name: run script

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: run_sh
        run: |
         chmod +x script.sh
         ./script.sh

      - uses: actions/upload-artifact@v7
        with:
          name: dragon.txt
          path: dragon.txt
  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: run_sh
        run: |
         chmod +x script.sh
         ./script.sh

      - uses: actions/download-artifact@v8
        with:
            name: dragon.txt
      - name: list
        run: ls
